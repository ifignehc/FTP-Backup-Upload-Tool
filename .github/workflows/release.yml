name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Compute version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.ref }}" -like "refs/tags/v*") {
            $version = "${{ github.ref_name }}".Substring(1)
          } else {
            $version = "1.0.${{ github.run_number }}"
          }

          "version=$version" >> $env:GITHUB_OUTPUT
          "fileVersion=$version.0" >> $env:GITHUB_OUTPUT

      - name: Test
        run: dotnet run --project tests/FtpBackupUploadTool.Tests/FtpBackupUploadTool.Tests.csproj

      - name: Publish portable exe
        shell: pwsh
        run: |
          ./scripts/publish-portable.ps1 `
            -Version "${{ steps.version.outputs.version }}" `
            -FileVersion "${{ steps.version.outputs.fileVersion }}" `
            -InformationalVersion "${{ steps.version.outputs.version }}+${{ github.sha }}"

      - name: Zip portable build
        shell: pwsh
        run: |
          Compress-Archive `
            -LiteralPath "artifacts/portable-win-x64/FTP BU Tool.exe" `
            -DestinationPath "artifacts/portable-win-x64/FTP-BU-Tool-${{ steps.version.outputs.version }}-win-x64.zip" `
            -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: FTP-BU-Tool-${{ steps.version.outputs.version }}-win-x64
          path: artifacts/portable-win-x64/FTP-BU-Tool-${{ steps.version.outputs.version }}-win-x64.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" `
            "artifacts/portable-win-x64/FTP-BU-Tool-${{ steps.version.outputs.version }}-win-x64.zip" `
            --generate-notes
